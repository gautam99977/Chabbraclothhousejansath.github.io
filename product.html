<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Product | Chhabra Cloth House</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Montserrat',sans-serif;
  background:#000;
  color:#e8dcc8;
  min-height:100vh;
  animation:pageReveal 0.8s ease forwards;
}
@keyframes pageReveal{
  from{opacity:0;transform:translateY(15px);}
  to{opacity:1;transform:translateY(0);}
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
  border-bottom:1px solid rgba(201,168,76,0.15);
  background:#000;
  position:sticky;
  top:0;
  z-index:100;
}
.nav-logo{
  font-family:'Cormorant Garamond',serif;
  font-size:18px;
  letter-spacing:4px;
  color:#e8dcc8;
  text-transform:lowercase;
}
.back-btn{
  display:flex;
  align-items:center;
  gap:10px;
  background:transparent;
  border:1px solid rgba(201,168,76,0.3);
  color:#C9A84C;
  padding:10px 25px;
  font-size:10px;
  letter-spacing:3px;
  text-transform:uppercase;
  cursor:pointer;
  font-family:'Montserrat',sans-serif;
  transition:all 0.3s ease;
  text-decoration:none;
}
.back-btn:hover,
.back-btn:active{background:#C9A84C;color:#000;}

/* PRODUCT LAYOUT */
.product-container{
  display:grid;
  grid-template-columns:1.2fr 1fr;
  min-height:calc(100vh - 70px);
}

/* PRODUCT IMAGE */
.product-image-section{
  position:relative;
  background:#0a0a0a;
  overflow:hidden;
  min-height:60vh;
}
.product-image-section img{
  width:100%;
  height:100%;
  object-fit:cover;
  animation:imageReveal 1s ease forwards;
}
@keyframes imageReveal{
  from{transform:scale(1.05);opacity:0;}
  to{transform:scale(1);opacity:1;}
}
.image-gold-line{
  position:absolute;
  top:0;right:0;
  width:1px;height:100%;
  background:linear-gradient(transparent,#C9A84C,transparent);
}

/* PRODUCT DETAILS */
.product-details-section{
  padding:60px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  background:#000;
  position:relative;
  overflow-y:auto;
}
.product-details-section::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at top right,rgba(201,168,76,0.05) 0%,transparent 60%);
  pointer-events:none;
}
.product-category{
  font-size:9px;
  letter-spacing:5px;
  color:#C9A84C;
  text-transform:uppercase;
  margin-bottom:15px;
  animation:fadeUp 0.8s ease 0.3s both;
}
.product-name{
  font-family:'Cormorant Garamond',serif;
  font-size:48px;
  font-weight:300;
  color:#e8dcc8;
  font-style:italic;
  line-height:1.1;
  margin-bottom:10px;
  animation:fadeUp 0.8s ease 0.4s both;
}
.product-price{
  font-size:28px;
  color:#C9A84C;
  font-family:'Cormorant Garamond',serif;
  margin-bottom:35px;
  animation:fadeUp 0.8s ease 0.5s both;
}
.gold-divider{
  width:60px;height:1px;
  background:#C9A84C;
  margin-bottom:30px;
  animation:fadeUp 0.8s ease 0.55s both;
}
.product-specs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-bottom:30px;
  animation:fadeUp 0.8s ease 0.6s both;
}
.spec-label{
  font-size:8px;
  letter-spacing:3px;
  color:#C9A84C;
  text-transform:uppercase;
  margin-bottom:5px;
}
.spec-value{
  font-family:'Cormorant Garamond',serif;
  font-size:16px;
  color:#e8dcc8;
}
.product-description{
  font-size:13px;
  color:rgba(232,220,200,0.6);
  line-height:2;
  margin-bottom:40px;
  animation:fadeUp 0.8s ease 0.7s both;
}

/* WHATSAPP BUTTON */
.whatsapp-order-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  padding:18px 40px;
  background:linear-gradient(135deg,#C9A84C,#DAA520);
  color:#000;
  border:none;
  font-size:11px;
  letter-spacing:4px;
  text-transform:uppercase;
  font-family:'Montserrat',sans-serif;
  font-weight:500;
  cursor:pointer;
  transition:all 0.3s ease;
  margin-bottom:15px;
  animation:fadeUp 0.8s ease 0.8s both;
  width:100%;
  position:relative;
  overflow:hidden;
}
.whatsapp-order-btn:hover,
.whatsapp-order-btn:active{
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(201,168,76,0.3);
}
.whatsapp-note{
  font-size:10px;
  color:rgba(232,220,200,0.4);
  letter-spacing:2px;
  text-align:center;
  animation:fadeUp 0.8s ease 0.9s both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* MOBILE */
@media(max-width:768px){
  nav{padding:15px 20px;}
  .product-container{
    grid-template-columns:1fr;
    grid-template-rows:50vh auto;
  }
  .product-image-section{min-height:50vh;}
  .product-details-section{padding:30px 25px 50px;}
  .product-name{font-size:34px;}
  .product-price{font-size:22px;}
  .back-btn{padding:8px 18px;font-size:9px;}
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="nav-logo">chhabra cloth house</div>
  <!-- BACK BUTTON → goes back to homepage -->
  <a class="back-btn" href="index.html">← Back</a>
</nav>

<!-- PRODUCT CONTAINER -->
<div class="product-container">

  <!-- PRODUCT IMAGE -->
  <!-- IMAGE IS SET AUTOMATICALLY FROM URL PARAMETERS -->
  <div class="product-image-section">
    <img id="productImage" src="" alt="Product"/>
    <div class="image-gold-line"></div>
  </div>

  <!-- PRODUCT DETAILS -->
  <div class="product-details-section">
    <div class="product-category" id="productCategory">Collection</div>
    <div class="product-name" id="productName">Loading...</div>
    <div class="product-price" id="productPrice">₹XXX</div>
    <div class="gold-divider"></div>
    <div class="product-specs">
      <div class="spec-item">
        <div class="spec-label">Fabric</div>
        <!-- CHANGE FABRIC DETAIL → edit in index.html onclick -->
        <div class="spec-value" id="productFabric">-</div>
      </div>
      <div class="spec-item">
        <div class="spec-label">Occasion</div>
        <!-- CHANGE OCCASION DETAIL → edit in index.html onclick -->
        <div class="spec-value" id="productOccasion">-</div>
      </div>
      <div class="spec-item">
        <div class="spec-label">Type</div>
        <div class="spec-value" id="productType">-</div>
      </div>
      <div class="spec-item">
        <div class="spec-label">Availability</div>
        <div class="spec-value" style="color:#4CAF50;">In Stock ✓</div>
      </div>
    </div>
    <!-- CHANGE DESCRIPTION → edit in index.html onclick -->
    <div class="product-description" id="productDescription">-</div>

    <!-- WHATSAPP ORDER BUTTON -->
    <!-- CHANGE WHATSAPP NUMBER HERE → replace 919286175004 -->
    <button class="whatsapp-order-btn" id="whatsappBtn">
      💬 I Love This! Buy on WhatsApp
    </button>
    <div class="whatsapp-note">
      click to send your interest directly to owner
    </div>
  </div>

</div>

<script>
// ============================================
// LOAD PRODUCT FROM URL PARAMETERS
// WORKS ON PHONE & COMPUTER BOTH! ✅
// ============================================
window.addEventListener('load', function(){

  // Read URL parameters
  const params = new URLSearchParams(window.location.search);

  const image = params.get('image') || '';
  const ext = params.get('ext') || 'png';
  const name = params.get('name') || 'Product';
  const price = params.get('price') || '₹XXX';
  const fabric = params.get('fabric') || '-';
  const occasion = params.get('occasion') || '-';
  const description = params.get('description') || '-';

  // SET PRODUCT IMAGE
  // CHANGE IMAGE FOLDER HERE if needed → currently 'images/'
  const imgEl = document.getElementById('productImage');

  // Handle spaces in filename (new model.png)
  const imagePath = 'images/' + image + '.' + ext;
  imgEl.src = imagePath;

  imgEl.onerror = function(){
    // Try alternate extension if first fails
    const altExt = ext === 'png' ? 'jpg' : 'png';
    this.src = 'images/' + image + '.' + altExt;
    this.onerror = null;
  };

  // SET ALL DETAILS
  document.getElementById('productName').textContent = name;
  document.getElementById('productPrice').textContent = price;
  document.getElementById('productFabric').textContent = fabric;
  document.getElementById('productOccasion').textContent = occasion;
  document.getElementById('productDescription').textContent = description;

  // Set product type based on image name
  let type = 'Premium Collection';
  let category = 'Collection';
  if(image.includes('duppata')){
    type = 'Dupatta';
    category = 'Dupatta Collection';
  } else if(image.includes('suit') || image.includes('model')){
    type = 'Suit';
    category = 'Suits Collection';
  } else if(image.includes('grey') || image.includes('yellow') ||
             image.includes('red') || image.includes('fabric')){
    type = 'Fabric';
    category = 'Fabric Collection';
  }
  document.getElementById('productType').textContent = type;
  document.getElementById('productCategory').textContent = category;

  // SET WHATSAPP MESSAGE & BUTTON
  // CHANGE WHATSAPP NUMBER HERE → replace 919286175004
  const phone = '919286175004';
  // CHANGE MESSAGE FORMAT HERE if needed
  const message = encodeURIComponent(
    `I love this ${name} 💛\nPrice: ${price}\nFrom: Chhabra Cloth House\nPlease confirm my order.`
  );

  document.getElementById('whatsappBtn').addEventListener('click', function(){
    window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
  });

});
</script>
</body>
</html>
