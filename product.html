<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Product | Chhabra Cloth House</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>

/* ============================================
   PRODUCT PAGE - BLACK & GOLD
   ============================================ */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Montserrat',sans-serif;
  background:#000;
  color:#e8dcc8;
  min-height:100vh;
  animation: pageReveal 0.8s ease forwards;
}
@keyframes pageReveal{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
  border-bottom:1px solid rgba(201,168,76,0.15);
  background:#000;
}
.nav-logo{
  font-family:'Cormorant Garamond',serif;
  font-size:18px;
  letter-spacing:4px;
  color:#e8dcc8;
  text-transform:lowercase;
}
.back-btn{
  display:flex;
  align-items:center;
  gap:10px;
  background:transparent;
  border:1px solid rgba(201,168,76,0.3);
  color:#C9A84C;
  padding:10px 25px;
  font-size:10px;
  letter-spacing:3px;
  text-transform:uppercase;
  cursor:pointer;
  font-family:'Montserrat',sans-serif;
  transition:all 0.3s ease;
}
.back-btn:hover{
  background:#C9A84C;
  color:#000;
}

/* PRODUCT LAYOUT */
.product-container{
  display:grid;
  grid-template-columns:1.2fr 1fr;
  min-height:calc(100vh - 80px);
  gap:0;
}

/* PRODUCT IMAGE */
.product-image-section{
  position:relative;
  background:#0a0a0a;
  overflow:hidden;
}
.product-image-section img{
  width:100%;
  height:100%;
  object-fit:cover;
  animation:imageReveal 1s ease forwards;
}
@keyframes imageReveal{
  from{transform:scale(1.05);opacity:0;}
  to{transform:scale(1);opacity:1;}
}
.image-gold-line{
  position:absolute;
  top:0;right:0;
  width:1px;
  height:100%;
  background:linear-gradient(transparent,#C9A84C,transparent);
}

/* PRODUCT DETAILS */
.product-details-section{
  padding:60px 60px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  background:#000;
  position:relative;
}
.product-details-section::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at top right,rgba(201,168,76,0.05) 0%,transparent 60%);
  pointer-events:none;
}
.product-category{
  font-size:9px;
  letter-spacing:5px;
  color:#C9A84C;
  text-transform:uppercase;
  margin-bottom:15px;
  animation:fadeUp 0.8s ease 0.3s forwards;
  opacity:0;
}
.product-name{
  font-family:'Cormorant Garamond',serif;
  font-size:52px;
  font-weight:300;
  color:#e8dcc8;
  font-style:italic;
  line-height:1.1;
  margin-bottom:10px;
  animation:fadeUp 0.8s ease 0.4s forwards;
  opacity:0;
}
.product-price{
  font-size:28px;
  color:#C9A84C;
  font-family:'Cormorant Garamond',serif;
  margin-bottom:40px;
  animation:fadeUp 0.8s ease 0.5s forwards;
  opacity:0;
}
.gold-divider{
  width:60px;
  height:1px;
  background:#C9A84C;
  margin-bottom:35px;
  animation:fadeUp 0.8s ease 0.55s forwards;
  opacity:0;
}

/* PRODUCT SPECS */
.product-specs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-bottom:35px;
  animation:fadeUp 0.8s ease 0.6s forwards;
  opacity:0;
}
.spec-item{}
.spec-label{
  font-size:8px;
  letter-spacing:3px;
  color:#C9A84C;
  text-transform:uppercase;
  margin-bottom:5px;
}
.spec-value{
  font-size:13px;
  color:#e8dcc8;
  font-family:'Cormorant Garamond',serif;
  font-size:16px;
}
.product-description{
  font-size:13px;
  color:rgba(232,220,200,0.6);
  line-height:2;
  margin-bottom:40px;
  animation:fadeUp 0.8s ease 0.7s forwards;
  opacity:0;
}

/* WHATSAPP BUTTON */
.whatsapp-order-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  padding:18px 40px;
  background:linear-gradient(135deg,#C9A84C,#DAA520);
  color:#000;
  border:none;
  font-size:11px;
  letter-spacing:4px;
  text-transform:uppercase;
  font-family:'Montserrat',sans-serif;
  font-weight:500;
  cursor:pointer;
  transition:all 0.3s ease;
  margin-bottom:15px;
  animation:fadeUp 0.8s ease 0.8s forwards;
  opacity:0;
  position:relative;
  overflow:hidden;
}
.whatsapp-order-btn::before{
  content:'';
  position:absolute;
  top:0;left:-100%;
  width:100%;height:100%;
  background:rgba(255,255,255,0.1);
  transition:left 0.4s ease;
}
.whatsapp-order-btn:hover::before{left:0;}
.whatsapp-order-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(201,168,76,0.3);
}
.whatsapp-note{
  font-size:10px;
  color:rgba(232,220,200,0.4);
  letter-spacing:2px;
  text-align:center;
  animation:fadeUp 0.8s ease 0.9s forwards;
  opacity:0;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* MOBILE */
@media(max-width:768px){
  nav{padding:15px 20px;}
  .product-container{grid-template-columns:1fr;}
  .product-image-section{min-height:60vh;}
  .product-details-section{padding:40px 25px;}
  .product-name{font-size:36px;}
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="nav-logo">chhabra cloth house</div>
  <button class="back-btn" onclick="window.history.back()">← Back</button>
</nav>

<!-- PRODUCT CONTAINER -->
<div class="product-container">

  <!-- PRODUCT IMAGE -->
  <div class="product-image-section">
    <!-- IMAGE IS SET AUTOMATICALLY FROM HOMEPAGE CLICK -->
    <img id="productImage" src="" alt="Product"/>
    <div class="image-gold-line"></div>
  </div>

  <!-- PRODUCT DETAILS -->
  <div class="product-details-section">
    <div class="product-category" id="productCategory">Collection</div>
    <div class="product-name" id="productName">Loading...</div>
    <div class="product-price" id="productPrice">₹XXX</div>
    <div class="gold-divider"></div>
    <div class="product-specs">
      <div class="spec-item">
        <div class="spec-label">Fabric</div>
        <!-- CHANGE FABRIC DETAIL HERE -->
        <div class="spec-value" id="productFabric">-</div>
      </div>
      <div class="spec-item">
        <div class="spec-label">Occasion</div>
        <!-- CHANGE OCCASION DETAIL HERE -->
        <div class="spec-value" id="productOccasion">-</div>
      </div>
      <div class="spec-item">
        <div class="spec-label">Type</div>
        <div class="spec-value" id="productType">-</div>
      </div>
      <div class="spec-item">
        <div class="spec-label">Availability</div>
        <div class="spec-value" style="color:#4CAF50;">In Stock ✓</div>
      </div>
    </div>
    <div class="product-description" id="productDescription">-</div>

    <!-- WHATSAPP ORDER BUTTON -->
    <!-- CHANGE WHATSAPP NUMBER HERE → replace 919286175004 -->
    <button class="whatsapp-order-btn" id="whatsappBtn">
      💬 I Love This! Buy on WhatsApp
    </button>
    <div class="whatsapp-note">
      click to send your interest directly to owner
    </div>
  </div>

</div>

<script>
// ============================================
// LOAD PRODUCT DATA FROM HOMEPAGE
// ============================================
window.addEventListener('load', function(){

  // Get product data passed from homepage
  const data = JSON.parse(localStorage.getItem('currentProduct'));

  if(data){
    // SET PRODUCT IMAGE
    // CHANGE IMAGE PATH HERE if images folder changes
    document.getElementById('productImage').src = 'images/' + data.image + '.png';

    // Handle jpg images
    document.getElementById('productImage').onerror = function(){
      this.src = 'images/' + data.image + '.jpg';
    };

    // SET PRODUCT DETAILS
    // CHANGE DETAILS HERE using comments in index.html
    document.getElementById('productName').textContent = data.name;
    document.getElementById('productPrice').textContent = data.price;
    document.getElementById('productFabric').textContent = data.fabric;
    document.getElementById('productOccasion').textContent = data.occasion;
    document.getElementById('productDescription').textContent = data.description;

    // Set category based on image name
    let category = 'Collection';
    if(data.image.includes('duppata')) category = 'Dupatta Collection';
    else if(data.image.includes('suit')) category = 'Suits Collection';
    else if(data.image.includes('fabric') || data.image.includes('grey') ||
            data.image.includes('yellow') || data.image.includes('red'))
      category = 'Fabric Collection';
    document.getElementById('productCategory').textContent = category;

    // SET WHATSAPP MESSAGE
    // CHANGE WHATSAPP NUMBER HERE → replace 919286175004
    const phone = '919286175004';
    // CHANGE MESSAGE FORMAT HERE
    const message = `I love this ${data.name} 💛%0APrice: ${data.price}%0AFrom: Chhabra Cloth House%0APlease confirm my order.`;
    document.getElementById('whatsappBtn').onclick = function(){
      window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
    };
  }
});
</script>

</body>
</html>
